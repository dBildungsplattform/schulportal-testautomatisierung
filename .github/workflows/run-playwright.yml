name: Run Playwright Tests
run-name: Test ${{ inputs.frontendHostname }} with ${{ inputs.browser }} and ${{ inputs.tag }} from ${{ inputs.playwright_branch }}

on:
  workflow_call:
    secrets:
      SPSH_DEV_USER_SSHKEY:
        required: false
      SPSH_DEV_KUBECONFIG:
        required: false
      SPSH_DEV_TUNNEL_USERNAME:
        required: false
      SPSH_DEV_TUNNEL_HOST:
        required: false
      SPSH_DEV_TUNNEL_PORT:
        required: false
      USER:
        required: true
      PW:
        required: true
      OTP_SEED_B32:
        required: false
      RC_WEBHOOK:
        required: true

    inputs:
      frontendHostname:
        type: string
        required: true
        default: main.dev.spsh.dbildungsplattform.de
      namespace_to_use:
        type: string
        required: false
        default: main
      tag:
        type: string
        required: true
        default: dev
      browser:
        type: string
        required: true
        default: chromium
      playwright_branch:
        type: string
        required: false
        default: main
      send_notifications:
        type: boolean
        required: false

  workflow_dispatch:
    inputs:
      frontendHostname:
        type: string
        required: true
        default: main.dev.spsh.dbildungsplattform.de
      namespace_to_use:
        type: string
        required: false
        default: main
      tag:
        type: choice
        required: true
        default: dev
        options: [smoke, dev, stage]
      browser:
        type: choice
        required: true
        default: chromium
        options: [chromium, chrome, firefox, webkit, msedge]
      playwright_branch:
        type: string
        required: false
        default: main

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      # --------------------------
      # Checkout
      # --------------------------
      - uses: actions/checkout@v3
        with:
          repository: dBildungsplattform/schulportal-testautomatisierung
          ref: ${{ inputs.playwright_branch }}

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      # --------------------------
      # Dependencies
      # --------------------------
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # --------------------------
      # SSH (dev only)
      # --------------------------
      - name: Setup SSH agent
        if: ${{ inputs.tag == 'dev' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SPSH_DEV_USER_SSHKEY }}

      # --------------------------
      # kubeconfig (dev only)
      # --------------------------
      - name: Add kubeconfig
        if: ${{ inputs.tag == 'dev' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SPSH_DEV_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # --------------------------
      # LDAP credentials (IMPORTANT FIX)
      # --------------------------
      - name: Get LDAP credentials
        if: ${{ inputs.tag == 'dev' }}
        run: |
          LDAP_ADMIN_USER=$(kubectl -n "${{ inputs.namespace_to_use }}" get secret dbildungs-iam-server -o jsonpath='{.data.ldap-bind-dn}' | base64 -d)
          LDAP_ADMIN_PASSWORD=$(kubectl -n "${{ inputs.namespace_to_use }}" get secret dbildungs-iam-server -o jsonpath='{.data.ldap-admin-password}' | base64 -d)

          echo "LDAP_ADMIN_USER=$LDAP_ADMIN_USER" >> $GITHUB_ENV
          echo "LDAP_ADMIN_PASSWORD=$LDAP_ADMIN_PASSWORD" >> $GITHUB_ENV

      # --------------------------
      # LDAP pod IP
      # --------------------------
      - name: Get LDAP Pod IP
        if: ${{ inputs.tag == 'dev' }}
        run: |
          POD_IP=$(kubectl get pod dbildungs-iam-ldap-0 -n "${{ inputs.namespace_to_use }}" -o=jsonpath='{.status.podIP}')
          echo "LDAP_POD_IP=$POD_IP" >> $GITHUB_ENV

      # --------------------------
      # SSH tunnel (FIXED: stable + blocking readiness)
      # --------------------------
      - name: Create SSH tunnel to LDAP
        if: ${{ inputs.tag == 'dev' }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            -L 1389:$LDAP_POD_IP:3389 \
            ${{ secrets.SPSH_DEV_TUNNEL_USERNAME }}@${{ secrets.SPSH_DEV_TUNNEL_HOST }} \
            -p ${{ secrets.SPSH_DEV_TUNNEL_PORT }} \
            -N -o ServerAliveInterval=15 -o ExitOnFailure=yes &

          echo "Waiting for LDAP tunnel..."
          for i in {1..15}; do
            nc -z localhost 1389 && echo "LDAP tunnel ready" && break
            sleep 1
          done

      # --------------------------
      # LDAP connectivity gate (CRITICAL FIX)
      # --------------------------
      - name: Test LDAP Connectivity
        if: ${{ inputs.tag == 'dev' }}
        run: |
          sudo apt-get update && sudo apt-get install -y ldap-utils

          ldapwhoami -x \
            -H ldap://localhost:1389 \
            -D "$LDAP_ADMIN_USER" \
            -w "$LDAP_ADMIN_PASSWORD"

      # --------------------------
      # Run Playwright tests (SHARDED)
      # --------------------------
      - name: Run Playwright tests
        env:
          FRONTEND_URL: https://${{ inputs.frontendHostname }}/
          TAG: ${{ inputs.tag }}
          BROWSER: ${{ inputs.browser }}
          USER: ${{ secrets.USER }}
          PW: ${{ secrets.PW }}
          OTP_SEED_B32: ${{ secrets.OTP_SEED_B32 }}
          LDAP_URL: ldap://localhost:1389
          LDAP_ADMIN_USER: ${{ env.LDAP_ADMIN_USER }}
          LDAP_ADMIN_PASSWORD: ${{ env.LDAP_ADMIN_PASSWORD }}
          NODE_OPTIONS: --no-experimental-strip-types
        run: |
          npx playwright test \
            --config=playwright.config.ts \
            --grep @"$TAG" \
            --project "$BROWSER" \
            --shard=${{ matrix.shard }}/3

      # --------------------------
      # Reports
      # --------------------------
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

      # --------------------------
      # Notifications
      # --------------------------
      - uses: RocketChat/Rocket.Chat.GitHub.Action.Notification@1.1.1
        if: ${{ inputs.send_notifications && failure() }}
        with:
          type: ${{ job.status }}
          job_name: 'Playwright Job Status: '
          url: ${{ secrets.RC_WEBHOOK }}
          channel: '#SPSH-Test-Automation'
          username: Playwright Notificator
