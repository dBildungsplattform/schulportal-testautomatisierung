name: Run Playwright Tests

run-name: Test ${{ inputs.frontendHostname }} with ${{ inputs.browser }} and ${{ inputs.tag }}

on:
  workflow_call:
    secrets:
      SPSH_DEV_USER_SSHKEY:
        required: false
      SPSH_DEV_KUBECONFIG:
        required: false
      SPSH_DEV_TUNNEL_USERNAME:
        required: false
      SPSH_DEV_TUNNEL_HOST:
        required: false
      SPSH_DEV_TUNNEL_PORT:
        required: false
      USER:
        required: true
      PW:
        required: true
      OTP_SEED_B32:
        required: false
      RC_WEBHOOK:
        required: true

    inputs:
      frontendHostname:
        type: string
        required: true
        default: 'main.dev.spsh.dbildungsplattform.de'
      namespace_to_use:
        type: string
        default: 'main'
      tag:
        type: string
        required: true
        default: 'dev'
      browser:
        type: string
        required: true
        default: 'chromium'
      playwright_branch:
        type: string
        default: main
      send_notifications:
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      frontendHostname:
        type: string
        default: 'main.dev.spsh.dbildungsplattform.de'
      namespace_to_use:
        type: string
        default: 'main'
      tag:
        type: choice
        options: [smoke, dev, stage]
        default: dev
      browser:
        type: choice
        options: [chromium, chrome, firefox, webkit, msedge]
        default: chromium
      playwright_branch:
        type: string
        default: main

jobs:
  # --------------------------
  # SETUP (RUNS ONCE)
  # --------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      ldap_ip: ${{ steps.ldap.outputs.ip }}
      ldap_user: ${{ steps.ldap_creds.outputs.user }}
      ldap_pass: ${{ steps.ldap_creds.outputs.pass }}

    steps:
      - uses: actions/checkout@v3
        with:
          repository: 'dBildungsplattform/schulportal-testautomatisierung'
          ref: ${{ inputs.playwright_branch }}

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Remove Microsoft APT
        run: |
          sudo rm /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update || true

      - name: Install dependencies
        run: npm ci

      - name: Type check + lint + format
        run: |
          npm run type-check
          npm run lint:ci
          npm run check-format

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Cache node_modules + browsers
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('package-lock.json') }}

      # --------------------------
      # DEV LDAP SETUP
      # --------------------------
      - name: Setup SSH agent
        if: ${{ inputs.tag == 'dev' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SPSH_DEV_USER_SSHKEY }}

      - name: Add kubeconfig
        if: ${{ inputs.tag == 'dev' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SPSH_DEV_KUBECONFIG }}" > ~/.kube/config

      - name: Get LDAP Pod IP
        id: ldap
        if: ${{ inputs.tag == 'dev' }}
        run: |
          IP=$(kubectl get pod dbildungs-iam-ldap-0 -n "${{ inputs.namespace_to_use }}" -o=jsonpath='{.status.podIP}')
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Get LDAP credentials
        id: ldap_creds
        if: ${{ inputs.tag == 'dev' }}
        run: |
          USER=$(kubectl -n "${{ inputs.namespace_to_use }}" get secret dbildungs-iam-server -o jsonpath='{.data.ldap-bind-dn}' | base64 -d)
          PASS=$(kubectl -n "${{ inputs.namespace_to_use }}" get secret dbildungs-iam-server -o jsonpath='{.data.ldap-admin-password}' | base64 -d)

          echo "::add-mask::$USER"
          echo "::add-mask::$PASS"

          echo "user=$USER" >> $GITHUB_OUTPUT
          echo "pass=$PASS" >> $GITHUB_OUTPUT

      # Upload prepared workspace
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: playwright-workspace
          path: .

  # --------------------------
  # TEST SHARDS
  # --------------------------
  test:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: playwright-workspace

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('package-lock.json') }}

      # --------------------------
      # DEV LDAP TUNNEL
      # --------------------------
      - name: Setup SSH agent
        if: ${{ inputs.tag == 'dev' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SPSH_DEV_USER_SSHKEY }}

      - name: Create SSH tunnel
        if: ${{ inputs.tag == 'dev' }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            -L 1389:${{ needs.setup.outputs.ldap_ip }}:3389 \
            ${{ secrets.SPSH_DEV_TUNNEL_USERNAME }}@${{ secrets.SPSH_DEV_TUNNEL_HOST }} \
            -p ${{ secrets.SPSH_DEV_TUNNEL_PORT }} \
            -N &

      # --------------------------
      # RUN TESTS
      # --------------------------
      - name: Run Playwright tests
        env:
          FRONTEND_URL: https://${{ inputs.frontendHostname }}/
          TAG: ${{ inputs.tag }}
          BROWSER: ${{ inputs.browser }}
          USER: ${{ secrets.USER }}
          PW: ${{ secrets.PW }}
          OTP_SEED_B32: ${{ secrets.OTP_SEED_B32 }}
          LDAP_URL: ldap://localhost:1389
          LDAP_ADMIN_USER: ${{ needs.setup.outputs.ldap_user }}
          LDAP_ADMIN_PASSWORD: ${{ needs.setup.outputs.ldap_pass }}
        run: |
          npx playwright test \
            --config=playwright.config.ts \
            --grep @"$TAG" \
            --project "$BROWSER" \
            --shard=${{ matrix.shard }}/5 \
            --retries=2

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.shard }}
          path: playwright-report/
