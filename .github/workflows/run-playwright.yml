name: Run Playwright Tests

run-name: Test ${{ inputs.frontendHostname }} with ${{ inputs.browser }} and ${{ inputs.tag }} from ${{ inputs.playwright_branch }}

on:
  workflow_call:
    secrets:
      SPSH_DEV_USER_SSHKEY:
        required: false
      SPSH_DEV_KUBECONFIG:
        required: false
      SPSH_DEV_TUNNEL_USERNAME:
        required: false
      SPSH_DEV_TUNNEL_HOST:
        required: false
      SPSH_DEV_TUNNEL_PORT:
        required: false
      USER:
        required: true
      PW:
        required: true
      OTP_SEED_B32:
        required: false
      RC_WEBHOOK:
        required: true

    inputs:
      frontendHostname:
        type: string
        required: true
        default: main.dev.spsh.dbildungsplattform.de
      namespace_to_use:
        type: string
        required: false
        default: main
      tag:
        type: string
        required: true
        default: dev
      browser:
        type: string
        required: true
        default: chromium
      playwright_branch:
        type: string
        required: false
        default: main
      send_notifications:
        type: boolean
        required: false

  workflow_dispatch:
    inputs:
      frontendHostname:
        type: string
        required: true
        default: main.dev.spsh.dbildungsplattform.de
      namespace_to_use:
        type: string
        required: false
        default: main
      tag:
        type: choice
        required: true
        options: [smoke, dev, stage]
        default: dev
      browser:
        type: choice
        required: true
        options: [chromium, chrome, firefox, webkit, msedge]
        default: chromium
      playwright_branch:
        type: string
        required: false
        default: main

jobs:
  run_playwright_tests:
    timeout-minutes: 60

    # 🔥 BIGGER RUNNER (important change)
    runs-on: ubuntu-22.04-8core

    steps:
      # --------------------------
      # Checkout & Node setup
      # --------------------------
      - uses: actions/checkout@v3
        with:
          repository: dBildungsplattform/schulportal-testautomatisierung
          ref: ${{ inputs.playwright_branch }}

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Remove Microsoft APT and Update Packages
        run: |
          sudo rm /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update || true

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Lint check
        run: npm run lint:ci

      - name: Prettier check
        run: npm run check-format

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # --------------------------
      # DEV SSH / KUBE / LDAP
      # --------------------------
      - name: Setup SSH agent
        if: ${{ inputs.tag == 'dev' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SPSH_DEV_USER_SSHKEY }}

      - name: Add kubeconfig
        if: ${{ inputs.tag == 'dev' }}
        env:
          KUBECONFIG_CONTENT: ${{ secrets.SPSH_DEV_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_CONTENT" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Get LDAP Pod IP
        if: ${{ inputs.tag == 'dev' }}
        env:
          NS: ${{ inputs.namespace_to_use }}
        run: |
          POD_IP=$(kubectl get pod dbildungs-iam-ldap-0 -n "$NS" -o=jsonpath='{.status.podIP}')
          echo "LDAP_POD_IP=$POD_IP" >> $GITHUB_ENV

      - name: Get LDAP credentials
        if: ${{ inputs.tag == 'dev' }}
        env:
          NS: ${{ inputs.namespace_to_use }}
        run: |
          LDAP_ADMIN_USER=$(kubectl -n "$NS" get secret dbildungs-iam-server -o jsonpath='{.data.ldap-bind-dn}' | base64 -d)
          LDAP_ADMIN_PASSWORD=$(kubectl -n "$NS" get secret dbildungs-iam-server -o jsonpath='{.data.ldap-admin-password}' | base64 -d)

          echo "::add-mask::$LDAP_ADMIN_USER"
          echo "::add-mask::$LDAP_ADMIN_PASSWORD"

          echo "LDAP_ADMIN_USER=$LDAP_ADMIN_USER" >> $GITHUB_ENV
          echo "LDAP_ADMIN_PASSWORD=$LDAP_ADMIN_PASSWORD" >> $GITHUB_ENV

      - name: Create SSH tunnel to LDAP
        if: ${{ inputs.tag == 'dev' }}
        env:
          SPSH_DEV_TUNNEL_USERNAME: ${{ secrets.SPSH_DEV_TUNNEL_USERNAME }}
          SPSH_DEV_TUNNEL_HOST: ${{ secrets.SPSH_DEV_TUNNEL_HOST }}
          SPSH_DEV_TUNNEL_PORT: ${{ secrets.SPSH_DEV_TUNNEL_PORT }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -L 1389:$LDAP_POD_IP:3389 \
              $SPSH_DEV_TUNNEL_USERNAME@$SPSH_DEV_TUNNEL_HOST \
              -p $SPSH_DEV_TUNNEL_PORT \
              -N -o ServerAliveInterval=15 -o ExitOnForwardFailure=yes &
          disown

      - name: Install ldap-utils
        if: ${{ inputs.tag == 'dev' }}
        run: sudo apt-get install -y ldap-utils

      - name: Test LDAP Connectivity
        if: ${{ inputs.tag == 'dev' }}
        run: ldapwhoami -x -H ldap://localhost:1389 -D "$LDAP_ADMIN_USER" -w "$LDAP_ADMIN_PASSWORD"

      # --------------------------
      # RUN TESTS (NO SHARDING)
      # --------------------------
      - name: Run Playwright tests
        env:
          FRONTEND_URL: https://${{ inputs.frontendHostname }}/
          TAG: ${{ inputs.tag }}
          BROWSER: ${{ inputs.browser }}
          USER: ${{ secrets.USER }}
          PW: ${{ secrets.PW }}
          OTP_SEED_B32: ${{ secrets.OTP_SEED_B32 }}
          LDAP_URL: ldap://localhost:1389
          LDAP_ADMIN_USER: ${{ env.LDAP_ADMIN_USER }}
          LDAP_ADMIN_PASSWORD: ${{ env.LDAP_ADMIN_PASSWORD }}
          NODE_OPTIONS: --no-experimental-strip-types
        run: |
          npx playwright test \
            --config=playwright.config.ts \
            --grep @"$TAG" \
            --project "$BROWSER" \
            --workers=4

      # --------------------------
      # REPORT (single run now)
      # --------------------------
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # --------------------------
      # Notifications
      # --------------------------
      - uses: RocketChat/Rocket.Chat.GitHub.Action.Notification@2966f5f2e0313a94f965a51c08700cfecf0b6572
        if: ${{ inputs.send_notifications && failure() }}
        with:
          type: ${{ job.status }}
          job_name: 'Playwright Job Status: '
          url: ${{ secrets.RC_WEBHOOK }}
          channel: '#SPSH-Test-Automation'
          username: Playwright Notificator
