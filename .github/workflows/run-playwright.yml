name: Run Playwright Tests
run-name: Test ${{ inputs.frontendHostname }} with ${{ inputs.browser }} and ${{ inputs.tag }} from ${{ inputs.playwright_branch }}

on:
  workflow_call:
    secrets:
      SPSH_DEV_USER_SSHKEY:
        required: false
      SPSH_DEV_KUBECONFIG:
        required: false
      SPSH_DEV_TUNNEL_USERNAME:
        required: false
      SPSH_DEV_TUNNEL_HOST:
        required: false
      SPSH_DEV_TUNNEL_PORT:
        required: false
      USER:
        required: true
      PW:
        required: true
      OTP_SEED_B32:
        required: false
      RC_WEBHOOK:
        required: true

    inputs:
      frontendHostname:
        type: string
        required: true
        default: main.dev.spsh.dbildungsplattform.de
      namespace_to_use:
        type: string
        required: false
        default: main
      tag:
        type: string
        required: true
        default: dev
      browser:
        type: string
        required: true
        default: chromium
      playwright_branch:
        type: string
        required: false
        default: main
      send_notifications:
        type: boolean
        required: false

  workflow_dispatch:
    inputs:
      frontendHostname:
        type: string
        required: true
        default: main.dev.spsh.dbildungsplattform.de
      namespace_to_use:
        type: string
        required: false
        default: main
      tag:
        type: choice
        required: true
        default: dev
        options: [smoke, dev, stage]
      browser:
        type: choice
        required: true
        default: chromium
        options: [chromium, chrome, firefox, webkit, msedge]
      playwright_branch:
        type: string
        required: false
        default: main

jobs:
  # ---------------------------------------------------
  # 1. LIGHTWEIGHT SHARED SETUP (runs ONCE per workflow)
  # ---------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      frontend_url: ${{ steps.out.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v3
        with:
          repository: dBildungsplattform/schulportal-testautomatisierung
          ref: ${{ inputs.playwright_branch }}

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies (cached)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('package-lock.json') }}

      - name: npm install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Output shared values
        id: out
        run: echo "frontend_url=https://${{ inputs.frontendHostname }}/" >> $GITHUB_OUTPUT

  # ---------------------------------------------------
  # 2. SHARDED TEST EXECUTION (ONLY TESTS RUN HERE)
  # ---------------------------------------------------
  test:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v3
        with:
          repository: dBildungsplattform/schulportal-testautomatisierung
          ref: ${{ inputs.playwright_branch }}

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      # --------------------------
      # Cache again (fast restore)
      # --------------------------
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('package-lock.json') }}

      - name: npm install (fast via cache)
        run: npm ci

      # --------------------------
      # Dev-only infrastructure (kept per shard but lightweight)
      # --------------------------
      - name: Setup SSH agent
        if: ${{ inputs.tag == 'dev' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SPSH_DEV_USER_SSHKEY }}

      - name: Add kubeconfig
        if: ${{ inputs.tag == 'dev' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.SPSH_DEV_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Get LDAP Pod IP
        if: ${{ inputs.tag == 'dev' }}
        run: |
          POD_IP=$(kubectl get pod dbildungs-iam-ldap-0 -n "${{ inputs.namespace_to_use }}" -o=jsonpath='{.status.podIP}')
          echo "LDAP_POD_IP=$POD_IP" >> $GITHUB_ENV

      - name: Create SSH tunnel to LDAP
        if: ${{ inputs.tag == 'dev' }}
        run: |
          ssh -o StrictHostKeyChecking=no \
            -L 1389:$LDAP_POD_IP:3389 \
            ${{ secrets.SPSH_DEV_TUNNEL_USERNAME }}@${{ secrets.SPSH_DEV_TUNNEL_HOST }} \
            -p ${{ secrets.SPSH_DEV_TUNNEL_PORT }} \
            -N -o ServerAliveInterval=15 -o ExitOnForwardFailure=yes &

      # --------------------------
      # RUN TESTS (ONLY REAL WORK)
      # --------------------------
      - name: Run Playwright tests
        env:
          FRONTEND_URL: ${{ needs.setup.outputs.frontend_url }}
          TAG: ${{ inputs.tag }}
          BROWSER: ${{ inputs.browser }}
          USER: ${{ secrets.USER }}
          PW: ${{ secrets.PW }}
          OTP_SEED_B32: ${{ secrets.OTP_SEED_B32 }}
          LDAP_URL: ldap://localhost:1389
          NODE_OPTIONS: --no-experimental-strip-types
        run: |
          npx playwright test \
            --config=playwright.config.ts \
            --grep @"$TAG" \
            --project "$BROWSER" \
            --shard=${{ matrix.shard }}/3

      # --------------------------
      # Reports per shard
      # --------------------------
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

      # --------------------------
      # Notifications
      # --------------------------
      - uses: RocketChat/Rocket.Chat.GitHub.Action.Notification@1.1.1
        if: ${{ inputs.send_notifications && failure() }}
        with:
          type: ${{ job.status }}
          job_name: 'Playwright Job Status: '
          url: ${{ secrets.RC_WEBHOOK }}
          channel: '#SPSH-Test-Automation'
          username: Playwright Notificator
